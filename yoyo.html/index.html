<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DIAJAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #f5fbf7;
      --bg-2: #e9f6ee;
      --card: #ffffff;
      --text: #13221b;
      --muted: #5d7267;
      --primary: #0f8a5f;
      --primary-hover: #0c6e4c;
      --line: #dce9e2;
      --shadow: 0 18px 50px rgba(15, 138, 95, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, #d9f7e6 0%, transparent 45%),
        radial-gradient(circle at 80% 0%, #c8efe0 0%, transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .login-card {
      width: min(100%, 440px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }

    .badge {
      display: inline-block;
      background: #e5f7ee;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 12px;
      margin-bottom: 14px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 138, 95, 0.16);
    }

    .password-wrap {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      color: var(--primary);
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 18px;
      font-size: 13px;
      color: var(--muted);
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .remember input {
      accent-color: var(--primary);
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, background-color .2s ease;
    }

    .btn-login:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .signup {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 24px 18px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="login-card">
    <span class="badge">DIAJAR</span>
    <h1>Masuk ke Akun Anda</h1>
    <p class="subtitle">Silakan login untuk melanjutkan ke dashboard pembelajaran.</p>

    <form action="#" method="post">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="Masukkan password" required>
          <button type="button" class="toggle-password" id="togglePassword">Lihat</button>
        </div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" name="remember">
          Ingat saya
        </label>
        <a href="#">Lupa password?</a>
      </div>

      <button class="btn-login" type="submit">Login</button>
    </form>

    <p class="signup">
      Belum punya akun? <a href="#">Daftar sekarang</a>
    </p>
  </main>

  <script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", () => {
      const showPassword = passwordInput.type === "password";
      passwordInput.type = showPassword ? "text" : "password";
      togglePassword.textContent = showPassword ? "Sembunyi" : "Lihat";
    });
  </script>
</body>
</html>
