<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrasi - DIAJAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #f5fbf7;
      --bg-2: #e9f6ee;
      --card: #ffffff;
      --text: #13221b;
      --muted: #5d7267;
      --primary: #0f8a5f;
      --primary-hover: #0c6e4c;
      --line: #dce9e2;
      --shadow: 0 18px 50px rgba(15, 138, 95, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, #d9f7e6 0%, transparent 45%),
        radial-gradient(circle at 80% 0%, #c8efe0 0%, transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .register-card {
      width: min(100%, 480px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }

    .badge {
      display: inline-block;
      background: #e5f7ee;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 12px;
      margin-bottom: 14px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 138, 95, 0.16);
    }

    .row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 6px 0 18px;
      font-size: 13px;
      color: var(--muted);
    }

    .row input {
      width: auto;
      margin-top: 2px;
      accent-color: var(--primary);
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .btn-register {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, background-color .2s ease;
    }

    .btn-register:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .signin {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .register-card {
        padding: 24px 18px;
      }

      h1 {
        font-size: 24px;
      }

      .field-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
  </style>
</head>
<body>
  <main class="register-card">
    <span class="badge">DIAJAR</span>
    <h1>Buat Akun Baru</h1>
    <p class="subtitle">Isi data di bawah untuk mulai belajar di platform DIAJAR.</p>

    <form action="#" method="post">
      <div class="field-row">
        <div class="field">
          <label for="firstName">Nama Depan</label>
          <input type="text" id="firstName" name="firstName" placeholder="Nama depan" required>
        </div>
        <div class="field">
          <label for="lastName">Nama Belakang</label>
          <input type="text" id="lastName" name="lastName" placeholder="Nama belakang" required>
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimal 8 karakter" minlength="8" required>
      </div>

      <div class="field">
        <label for="confirmPassword">Konfirmasi Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password" minlength="8" required>
      </div>

      <label class="row">
        <input type="checkbox" name="terms" required>
        Saya setuju dengan <a href="#">Syarat & Ketentuan</a> serta <a href="#">Kebijakan Privasi</a>.
      </label>

      <button class="btn-register" type="submit">Daftar Sekarang</button>
    </form>

    <p class="signin">
      Sudah punya akun? <a href="index.html">Masuk di sini</a>
    </p>
  </main>
</body>
</html>
